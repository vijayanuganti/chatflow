# Reference config for ChatFlow on AWS EC2 (copy to /etc/nginx/sites-enabled/chatflow).
# client_max_body_size is required for folder video uploads (default nginx limit is 1MB).

server {
    listen 80;
    listen [::]:80;
    server_name vijay-chatflow.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vijay-chatflow.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/vijay-chatflow.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vijay-chatflow.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 512M;
    client_body_timeout 300s;

    root /home/ubuntu/chatflow/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST + WebSocket (/api/ws) — long timeouts keep mobile sockets alive
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_request_buffering off;
    }
}
