# Reference config for ChatFlow on OCI (copy to /etc/nginx/sites-enabled/chatflow).
# client_max_body_size is required for folder video uploads (default nginx limit is 1MB).

server {
    listen 80;
    server_name 140-245-209-196.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 140-245-209-196.sslip.io;

    ssl_certificate /etc/letsencrypt/live/140-245-209-196.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/140-245-209-196.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 512M;
    client_body_timeout 300s;

    root /home/ubuntu/chatflow/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    location /api/ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
    }
}
